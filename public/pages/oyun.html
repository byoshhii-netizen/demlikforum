<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Oyun – Demlik Platform</title>
<link rel="stylesheet" href="/css/main.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
.info-row { display:flex; flex-direction:column; gap:2px; }
.info-label { font-size:10px; color:var(--text-3); text-transform:uppercase; letter-spacing:0.8px; font-weight:700; }
.info-value { font-size:13px; font-weight:500; }
.info-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.price-tag { font-size:28px; font-weight:900; letter-spacing:-0.5px; }
.price-tag.free { color:#27ae60; }
.price-tag.paid { color:var(--red-bright); }
.dl-progress { margin-top:14px; display:none; }
.dl-progress .dl-label { font-size:12px; color:var(--text-2); margin-bottom:6px; display:flex; align-items:center; gap:6px; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <a href="/magazin" class="btn btn-ghost btn-sm"><i class="fa-solid fa-arrow-left"></i> Store'a Dön</a>
    </header>
    <main class="page-content" id="pageContent">
      <div style="color:var(--text-3);padding:60px;text-align:center">
        <i class="fa-solid fa-spinner fa-spin" style="font-size:24px"></i>
      </div>
    </main>
  </div>
</div>
<script src="/js/common.js"></script>
<script>
renderSidebar('magazin');
const gameId = location.pathname.split('/').pop();
let me = null;

async function load() {
  me = await loadSession();
  const res = await fetch(`/api/oyunlar/${gameId}`).then(r => r.json());
  if (!res.game) { document.getElementById('pageContent').innerHTML = '<div class="alert alert-error" style="max-width:400px"><i class="fa-solid fa-circle-xmark"></i><span>Oyun bulunamadı</span></div>'; return; }
  render(res);
}

function render({ game: g, inLibrary, isInstalled }) {
  document.title = `${g.title} – Demlik Platform`;
  const allMedia = [...(g.banner_urls||[]), ...(g.video_urls||[])];

  document.getElementById('pageContent').innerHTML = `
    <div class="game-hero" style="height:340px;margin-bottom:20px">
      <img id="heroImg" src="${g.banner_urls?.[0]||''}" alt="${g.title}" onerror="this.style.display='none'">
      <div class="game-hero-overlay">
        <div style="display:flex;align-items:flex-end;gap:14px">
          ${g.logo_url ? `<img src="${g.logo_url}" style="width:64px;height:64px;border-radius:12px;border:2px solid rgba(255,255,255,0.15);flex-shrink:0">` : ''}
          <div>
            <div class="game-hero-title">${g.title}</div>
            <div class="game-hero-meta">${g.genre_name||''} &nbsp;·&nbsp; ${g.publisher_name||g.team_name||g.developer_name||''} &nbsp;·&nbsp; ${g.age_rating||0}+</div>
          </div>
        </div>
      </div>
    </div>

    ${allMedia.length > 1 ? `<div class="media-gallery">${allMedia.map((m,i) => {
      const isVid = g.video_urls?.includes(m);
      return `<div class="media-thumb ${i===0?'active':''}" onclick="switchMedia('${m}',${isVid},this)">
        ${isVid ? `<video src="${m}" muted></video>` : `<img src="${m}" alt="" loading="lazy">`}
      </div>`;
    }).join('')}</div>` : ''}

    <div class="game-detail-grid">
      <div>
        <div class="card" style="margin-bottom:14px">
          <div class="card-header"><div class="card-title">Hakkında</div></div>
          <div class="card-body">
            <p style="color:var(--text-2);line-height:1.75;font-size:14px">${g.description}</p>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">Oyun Bilgileri</div></div>
          <div class="card-body">
            <div class="info-grid">
              <div class="info-row"><span class="info-label">Geliştirici</span><span class="info-value">${g.team_name||g.developer_name||'-'}</span></div>
              <div class="info-row"><span class="info-label">Yayıncı</span><span class="info-value">${g.publisher_name||'-'}</span></div>
              <div class="info-row"><span class="info-label">Tür</span><span class="info-value">${g.genre_name||'-'}</span></div>
              <div class="info-row"><span class="info-label">Yaş Sınırı</span><span class="info-value">${g.age_rating||0}+</span></div>
              <div class="info-row"><span class="info-label">İndirme</span><span class="info-value">${g.download_count||0}</span></div>
              <div class="info-row"><span class="info-label">Kütüphane</span><span class="info-value">${g.library_count||0}</span></div>
            </div>
          </div>
        </div>
      </div>

      <div class="game-sidebar-card">
        ${g.logo_url ? `<img src="${g.logo_url}" style="width:100%;border-radius:var(--radius);margin-bottom:16px;border:1px solid var(--border)">` : ''}
        <div class="price-tag ${g.is_free?'free':'paid'}" style="margin-bottom:6px">
          ${g.is_free ? 'Ücretsiz' : '₺'+parseFloat(g.price||0).toFixed(2)}
        </div>
        ${g.is_purchase_disabled ? `<div style="font-size:12px;color:var(--text-3);margin-bottom:12px"><i class="fa-solid fa-lock" style="font-size:10px"></i> Satışa kapalı</div>` : '<div style="margin-bottom:14px"></div>'}
        <div id="actionBtn"></div>
        <div class="dl-progress" id="dlProg">
          <div class="dl-label"><i class="fa-solid fa-spinner fa-spin"></i><span id="dlTxt">Hazırlanıyor...</span></div>
          <div class="progress-bar"><div class="progress-fill" id="dlFill" style="width:0%"></div></div>
        </div>
      </div>
    </div>
  `;
  updateBtn(inLibrary, isInstalled, g);
}

function updateBtn(inLib, installed, g) {
  const el = document.getElementById('actionBtn');
  if (!me?.loggedIn) {
    el.innerHTML = `<a href="/giris" class="btn btn-primary btn-full btn-xl"><i class="fa-solid fa-right-to-bracket"></i> Giriş Yap</a>`;
  } else if (installed) {
    el.innerHTML = `
      <button class="btn btn-success btn-full btn-xl" onclick="oyunAc()"><i class="fa-solid fa-play"></i> Oyna</button>
      <button class="btn btn-ghost btn-full btn-sm" style="margin-top:8px" onclick="indir()"><i class="fa-solid fa-rotate-right"></i> Yeniden İndir</button>`;
  } else if (inLib) {
    el.innerHTML = `<button class="btn btn-primary btn-full btn-xl" onclick="indir()"><i class="fa-solid fa-download"></i> İndir</button>`;
  } else {
    if (g.is_purchase_disabled) {
      el.innerHTML = `<button class="btn btn-ghost btn-full" disabled>Satışa Kapalı</button>`;
    } else {
      el.innerHTML = `<button class="btn btn-primary btn-full btn-xl" onclick="ekle()">
        <i class="fa-solid fa-${g.is_free?'plus':'cart-shopping'}"></i>
        ${g.is_free ? 'Kütüphaneye Ekle' : '₺'+parseFloat(g.price||0).toFixed(2)+' – Satın Al'}
      </button>`;
    }
  }
}

function switchMedia(src, isVid, el) {
  document.querySelectorAll('.media-thumb').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const img = document.getElementById('heroImg');
  img.src = isVid ? '' : src;
  img.style.display = isVid ? 'none' : 'block';
}

async function ekle() {
  try { await api(`/api/oyunlar/${gameId}/ekle`, { method: 'POST' }); toast('Kütüphaneye eklendi!', 'success'); load(); }
  catch (e) { toast(e.message, 'error'); }
}

async function indir() {
  try {
    const res = await api(`/api/oyunlar/${gameId}/indir`, { method: 'POST' });
    document.getElementById('dlProg').style.display = 'block';
    const link = document.createElement('a'); link.href = res.url; link.download = res.filename;
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
    let p = 0;
    const iv = setInterval(() => {
      p += Math.random() * 7;
      if (p >= 100) { p = 100; clearInterval(iv); document.getElementById('dlTxt').textContent = 'İndirme tamamlandı'; markInstalled(); }
      document.getElementById('dlFill').style.width = p + '%';
      document.getElementById('dlTxt').textContent = `İndiriliyor... %${Math.round(p)}`;
    }, 500);
  } catch (e) { toast(e.message, 'error'); }
}

async function markInstalled() {
  await api(`/api/oyunlar/${gameId}/yuklendi`, { method: 'POST' });
  toast('Oyun başarıyla yüklendi!', 'success');
  setTimeout(load, 1200);
}

function oyunAc() { toast('Oyun açılıyor... Kurulum dizinini kontrol edin', 'info'); }

load();
</script>
</body>
</html>
