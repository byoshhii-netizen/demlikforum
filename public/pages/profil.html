<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Profil – Demlik Platform</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar"><a href="javascript:history.back()" style="color:var(--text-muted);font-size:13px">← Geri</a></header>
    <main class="page-content" id="pageContent">
      <div style="color:var(--text-muted);padding:40px;text-align:center">Yükleniyor...</div>
    </main>
  </div>
</div>
<script src="/js/common.js"></script>
<script>
renderSidebar();
const username = location.pathname.split('/').pop();

async function loadProfile() {
  const me = await loadSession();
  const res = await (await fetch(`/api/kullanicilar/profil/${username}`)).json();
  if (!res.user) { document.getElementById('pageContent').innerHTML = '<div class="alert alert-error">Kullanıcı bulunamadı</div>'; return; }
  const u = res.user;
  const isMe = me.loggedIn && me.username === username;
  const roleLabel = u.role === 'admin' ? '⚙️ Admin' : u.role === 'developer' ? '👨‍💻 Geliştirici' : '🎮 Kullanıcı';

  document.title = `${u.username} – Demlik Platform`;

  document.getElementById('pageContent').innerHTML = `
    <!-- Profil başlık -->
    <div class="card" style="padding:28px;margin-bottom:24px">
      <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
        <div class="user-avatar" style="width:80px;height:80px;font-size:32px;border-radius:16px;border:3px solid var(--red-primary)">
          ${u.avatar_url ? `<img src="${u.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:13px">` : u.username[0].toUpperCase()}
        </div>
        <div style="flex:1">
          <div style="font-size:24px;font-weight:800">${u.username}</div>
          <div style="color:var(--text-muted);margin-top:4px">${roleLabel}</div>
          ${u.bio ? `<div style="margin-top:8px;font-size:14px;color:var(--text-secondary);max-width:500px">${u.bio}</div>` : ''}
          <div style="margin-top:8px;font-size:12px;color:var(--text-muted)">Üye: ${new Date(u.created_at).toLocaleDateString('tr-TR')}</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${isMe ? `<a href="/ayarlar/profil" class="btn btn-secondary btn-sm">✏️ Profili Düzenle</a>` : ''}
          ${!isMe && me.loggedIn ? `
            <button class="btn btn-secondary btn-sm" onclick="arkadaşlıkIste()">👥 Arkadaşlık İste</button>
            <button class="btn btn-danger btn-sm" onclick="engelle()">🚫 Engelle</button>
          ` : ''}
        </div>
      </div>
    </div>

    <!-- Oyunlar -->
    ${u.show_games && res.games?.length ? `
    <div class="page-header"><div class="page-title">🎮 Oyun Kütüphanesi (${res.games.length})</div></div>
    <div class="games-grid">
      ${res.games.map(g => `
        <div class="game-card ${g.is_installed ? 'installed' : 'not-installed'}" onclick="location.href='/oyun/${g.id}'">
          <div class="game-card-banner">
            ${g.logo_url ? `<img src="${g.logo_url}" alt="${g.title}">` : `<div style="background:var(--bg-hover);width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px">🎮</div>`}
          </div>
          <div class="game-card-info">
            <div class="game-card-title">${g.title}</div>
            <div style="font-size:11px;color:${g.is_installed ? '#27ae60' : 'var(--text-muted)'}">${g.is_installed ? '✓ Yüklü' : '● Yüklenmemiş'}</div>
          </div>
        </div>
      `).join('')}
    </div>
    ` : !u.show_games ? `<div class="alert alert-info">Bu kullanıcı oyun kütüphanesini gizlemiş.</div>` : ''}
  `;
}

async function arkadaşlıkIste() {
  const u = await loadSession();
  if (!u.loggedIn) return window.location.href = '/giris';
  const res = await (await fetch(`/api/kullanicilar/profil/${username}`)).json();
  try {
    await api(`/api/arkadaslar/istek/${res.user.id}`, { method: 'POST' });
    toast('Arkadaşlık isteği gönderildi', 'success');
  } catch (err) { toast(err.message, 'error'); }
}

async function engelle() {
  const res = await (await fetch(`/api/kullanicilar/profil/${username}`)).json();
  if (confirm(`${username} adlı kullanıcıyı engellemek istediğinize emin misiniz?`)) {
    await api(`/api/kullanicilar/engelle/${res.user.id}`, { method: 'POST' });
    toast('Kullanıcı engellendi', 'info');
  }
}

loadProfile();
</script>
</body>
</html>
