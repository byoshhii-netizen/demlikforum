<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Panel – Demlik Platform</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <span style="font-weight:700;color:var(--red-primary)">⚙️ Admin Paneli</span>
    </header>
    <main class="page-content">
      <div class="page-header">
        <div class="page-title">Admin Dashboard</div>
      </div>
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card red"><div class="stat-label">Toplam Kullanıcı</div><div class="stat-value" id="sUsers">-</div></div>
        <div class="stat-card green"><div class="stat-label">Yayındaki Oyun</div><div class="stat-value" id="sGames">-</div></div>
        <div class="stat-card yellow"><div class="stat-label">Bekleyen Başvuru</div><div class="stat-value" id="sPending">-</div></div>
        <div class="stat-card blue"><div class="stat-label">Toplam İndirme</div><div class="stat-value" id="sDownloads">-</div></div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-top:8px">
        <a href="/admin/basvurular" class="card" style="padding:20px;display:flex;align-items:center;gap:14px;text-decoration:none;transition:border-color 0.2s" onmouseover="this.style.borderColor='var(--red-primary)'" onmouseout="this.style.borderColor='var(--border)'">
          <span style="font-size:32px">📋</span>
          <div><div style="font-weight:700">Geliştirici Başvuruları</div><div style="font-size:12px;color:var(--text-muted)" id="pendingCount">Yükleniyor...</div></div>
        </a>
        <a href="/admin/oyunlar" class="card" style="padding:20px;display:flex;align-items:center;gap:14px;text-decoration:none;transition:border-color 0.2s" onmouseover="this.style.borderColor='var(--red-primary)'" onmouseout="this.style.borderColor='var(--border)'">
          <span style="font-size:32px">🎮</span>
          <div><div style="font-weight:700">Oyun Yönetimi</div><div style="font-size:12px;color:var(--text-muted)">Tüm oyunlar</div></div>
        </a>
        <a href="/admin/kullanicilar" class="card" style="padding:20px;display:flex;align-items:center;gap:14px;text-decoration:none;transition:border-color 0.2s" onmouseover="this.style.borderColor='var(--red-primary)'" onmouseout="this.style.borderColor='var(--border)'">
          <span style="font-size:32px">👥</span>
          <div><div style="font-weight:700">Kullanıcılar</div><div style="font-size:12px;color:var(--text-muted)">Tüm kullanıcılar & geliştiriciler</div></div>
        </a>
        <a href="/admin/turler" class="card" style="padding:20px;display:flex;align-items:center;gap:14px;text-decoration:none;transition:border-color 0.2s" onmouseover="this.style.borderColor='var(--red-primary)'" onmouseout="this.style.borderColor='var(--border)'">
          <span style="font-size:32px">🏷️</span>
          <div><div style="font-weight:700">Oyun Türleri</div><div style="font-size:12px;color:var(--text-muted)">Ekle / Sil</div></div>
        </a>
        <a href="/admin/ayarlar" class="card" style="padding:20px;display:flex;align-items:center;gap:14px;text-decoration:none;transition:border-color 0.2s" onmouseover="this.style.borderColor='var(--red-primary)'" onmouseout="this.style.borderColor='var(--border)'">
          <span style="font-size:32px">⚙️</span>
          <div><div style="font-weight:700">Platform Ayarları</div><div style="font-size:12px;color:var(--text-muted)">Ücretsiz limit vb.</div></div>
        </a>
      </div>
    </main>
  </div>
</div>
<script src="/js/common.js"></script>
<script>
renderSidebar('admin');
async function loadStats() {
  const res = await (await fetch('/api/admin/istatistikler')).json();
  document.getElementById('sUsers').textContent = res.totalUsers || 0;
  document.getElementById('sGames').textContent = res.totalGames || 0;
  document.getElementById('sPending').textContent = res.pendingApplications || 0;
  document.getElementById('sDownloads').textContent = res.totalDownloads || 0;
  document.getElementById('pendingCount').textContent = `${res.pendingApplications} bekleyen`;
}
loadStats();
</script>
</body>
</html>
