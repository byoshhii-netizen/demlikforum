<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Giriş Yap – Demlik Platform</title>
<link rel="stylesheet" href="/css/main.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
.input-icon-wrap { position: relative; }
.input-icon-wrap i { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text-3); font-size: 13px; pointer-events: none; }
.input-icon-wrap .form-control { padding-left: 38px; }
</style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon"><i class="fa-solid fa-fire"></i></div>
      <div class="auth-logo-name">Demlik</div>
      <div class="auth-logo-sub">Platform</div>
    </div>
    <div class="auth-title">Tekrar Hoşgeldin</div>
    <div class="auth-subtitle">Hesabınıza giriş yapın</div>
    <div id="alertBox"></div>
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">E-posta Adresi</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-envelope"></i>
          <input class="form-control" type="email" id="email" placeholder="ornek@mail.com" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Şifre</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-lock"></i>
          <input class="form-control" type="password" id="password" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn" style="margin-top:8px">
        <i class="fa-solid fa-right-to-bracket"></i> Giriş Yap
      </button>
    </form>
    <div class="sep">veya</div>
    <div style="text-align:center;font-size:13px;color:var(--text-2)">
      Hesabınız yok mu?
      <a href="/kayit" style="color:var(--red-bright);font-weight:600;margin-left:4px">Kayıt Ol</a>
    </div>
    <div style="text-align:center;margin-top:16px">
      <a href="/" style="font-size:12px;color:var(--text-3)">
        <i class="fa-solid fa-arrow-left" style="font-size:10px"></i> Ana Sayfaya Dön
      </a>
    </div>
  </div>
</div>
<script src="/js/common.js"></script>
<script>
(async () => { const u = await loadSession(); if (u.loggedIn) location.href = '/'; })();

document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Giriş yapılıyor...';
  document.getElementById('alertBox').innerHTML = '';
  try {
    const d = await api('/api/auth/giris', {
      method: 'POST',
      body: { email: document.getElementById('email').value, password: document.getElementById('password').value }
    });
    location.href = d.role === 'admin' ? '/admin' : '/';
  } catch (err) {
    document.getElementById('alertBox').innerHTML = `<div class="alert alert-error"><i class="fa-solid fa-circle-xmark"></i><span>${err.message}</span></div>`;
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Giriş Yap';
  }
});
</script>
</body>
</html>
